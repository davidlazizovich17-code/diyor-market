<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Diyor Market — Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container" style="min-height:100vh; display:grid; place-items:center;">
    <div class="card" style="width:min(420px,100%);">
      <div class="brand">
        <div class="logo">DM</div>
        <div>
          <h1>Diyor Market</h1>
          <div class="sub">Online Qarz Daftar — Admin Login</div>
        </div>
      </div>

      <div class="form" id="f">
        <div class="input">
          <label>Username</label>
          <input id="u" placeholder="admin" autocomplete="username" />
        </div>
        <div class="input">
          <label>Password</label>
          <input id="p" type="password" placeholder="•••••" autocomplete="current-password" />
        </div>
        <button class="btn primary" id="btn">Kirish</button>
        <div class="msg err" id="msg"></div>
      </div>
    </div>
  </div>

  <script>
    const u = document.getElementById("u");
    const p = document.getElementById("p");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    btn.onclick = async (e)=>{
      e.preventDefault();
      msg.textContent = "";
      try{
        const res = await fetch("/login", {
          method:"POST",
          credentials:"include",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ username:u.value, password:p.value })
        });
        const data = await res.json().catch(()=>({}));
        if(!res.ok) throw new Error(data.error || "Login error");
        location.href="/index.html";
      }catch(err){
        msg.textContent = err.message;
      }
    };
  </script>
</body>
</html>
