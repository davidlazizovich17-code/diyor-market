<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Diyor Market — Customers</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">DM</div>
        <div>
          <h1>Diyor Market</h1>
          <div class="sub">Customers</div>
        </div>
      </div>

      <nav class="nav">
        <a href="/index.html">📊 Dashboard</a>
        <a href="/customers.html">👥 Mijozlar</a>
        <a href="/debts.html">🧾 Qarzlar</a>
        <a href="/products.html">📦 Mahsulotlar</a>
        <a href="/today-debts.html">🗓️ Bugungi qarzlar</a>
        <a href="/today-payments.html">✅ Bugungi to‘lovlar</a>
        <a href="/settings.html">⚙️ Sozlamalar</a>
      </nav>

      <div class="pill">
        <span class="dot" id="dot"></span>
        <span id="healthText">...</span>
      </div>

      <button class="btn danger" style="width:100%; margin-top:12px" onclick="doLogout()">🚪 Logout</button>
    </aside>

    <main class="main">
      <div class="topbar">
        <div style="font-weight:800">Mijozlar</div>
        <div class="search">
          🔎 <input id="q" placeholder="Ism yoki telefon bo‘yicha qidirish..." />
        </div>
      </div>

      <div class="customersPage">
        <section class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
            <div>
              <div style="font-weight:800">Ro‘yxat</div>
              <div class="msg">Qidiruv orqali mijozlarni toping.</div>
            </div>
            <button class="btn" onclick="load()">🔄 Refresh</button>
          </div>

          <div class="tableWrap" style="margin-top:12px;">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Ism</th>
                  <th>Telefon</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="body"></tbody>
            </table>
          </div>
        </section>

        <section class="card">
          <div style="font-weight:800">Mijoz qo‘shish</div>

          <div class="form" style="margin-top:12px;">
            <div class="input">
              <label>Ism</label>
              <input id="name" placeholder="Masalan: Ali" />
            </div>

            <div class="input">
              <label>Telefon</label>
              <input id="phone" placeholder="+998..." />
            </div>

            <button class="btn primary" onclick="add()">➕ Saqlash</button>
            <div class="msg" id="msg"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
  <script>
    async function load(){
      const qv = q("#q").value.trim();
      const d = await api("/api/customers" + (qv ? `?q=${encodeURIComponent(qv)}` : ""));
      const b = q("#body");

      b.innerHTML = (d.rows || []).map(r => `
        <tr>
          <td>${r.id}</td>
          <td><b>${r.name}</b></td>
          <td>${r.phone || ""}</td>
          <td>
            <button class="btn" onclick="openDebts(${r.id})">🧾 Qarzlar</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="4" class="msg">Mijoz topilmadi.</td></tr>`;
    }

    function openDebts(id){
      location.href = "/debts.html?customer_id=" + id;
    }

    async function add(){
      q("#msg").textContent = "";
      try{
        const name = q("#name").value.trim();
        const phone = q("#phone").value.trim();

        await api("/api/customers", {
          method: "POST",
          body: JSON.stringify({ name, phone })
        });

        q("#msg").textContent = "✅ Mijoz saqlandi";
        q("#msg").className = "msg ok";
        q("#name").value = "";
        q("#phone").value = "";
        load();
      }catch(e){
        q("#msg").textContent = "❌ " + e.message;
        q("#msg").className = "msg err";
      }
    }

    q("#q").addEventListener("input", load);

    load();
  </script>
</body>
</html>
